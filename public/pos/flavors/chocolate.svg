<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3D1800"/>
      <stop offset="100%" stop-color="#1A0800"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A85828"/>
      <stop offset="100%" stop-color="#7B3812"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="47" fill="url(#dbg)"/>

  <!-- 3D chocolate bar piece -->
  <!-- Right face (shadow side) -->
  <path d="M76 30 L84 20 L84 68 L76 78 Z" fill="#2A0C00"/>
  <!-- Top face (medium warm brown) -->
  <path d="M14 30 L22 20 L84 20 L76 30 Z" fill="#C07028"/>
  <!-- Front face (main face) -->
  <rect x="14" y="30" width="62" height="48" rx="3" fill="url(#face)"/>

  <!-- Segment grid on front face (3 × 3 squares) -->
  <rect x="16" y="32" width="18" height="13" rx="1.5" fill="#C07832" opacity="0.75"/>
  <rect x="36" y="32" width="18" height="13" rx="1.5" fill="#C07832" opacity="0.75"/>
  <rect x="56" y="32" width="18" height="13" rx="1.5" fill="#C07832" opacity="0.75"/>

  <rect x="16" y="47" width="18" height="13" rx="1.5" fill="#B86826" opacity="0.75"/>
  <rect x="36" y="47" width="18" height="13" rx="1.5" fill="#B86826" opacity="0.75"/>
  <rect x="56" y="47" width="18" height="13" rx="1.5" fill="#B86826" opacity="0.75"/>

  <rect x="16" y="62" width="18" height="14" rx="1.5" fill="#C07832" opacity="0.75"/>
  <rect x="36" y="62" width="18" height="14" rx="1.5" fill="#C07832" opacity="0.75"/>
  <rect x="56" y="62" width="18" height="14" rx="1.5" fill="#C07832" opacity="0.75"/>

  <!-- Gloss overlay on front face -->
  <rect x="14" y="30" width="62" height="48" rx="3" fill="url(#gloss)"/>
  <!-- Shine strip top-left -->
  <rect x="15" y="31" width="24" height="7" rx="2" fill="white" opacity="0.09"/>
</svg>
