  <circle cx="16" cy="24" r="2.5" fill="#D4A030" opacity="0.4"/>
  <circle cx="83" cy="18" r="2"   fill="#D4A030" opacity="0.35"/>
  <circle cx="86" cy="73" r="2.5" fill="#D4A030" opacity="0.3"/>
  <circle cx="12" cy="75" r="2"   fill="#D4A030" opacity="0.3"/>
