    <circle cx="50" cy="30" r="0.9" fill="#7A5030" opacity="0.7"/>
    <circle cx="50" cy="40" r="0.9" fill="#7A5030" opacity="0.7"/>
    <circle cx="50" cy="50" r="0.9" fill="#7A5030" opacity="0.7"/>
    <circle cx="50" cy="60" r="0.9" fill="#7A5030" opacity="0.7"/>
    <circle cx="50" cy="70" r="0.9" fill="#7A5030" opacity="0.7"/>
    <path d="M44 84 C44 90 56 90 56 84" fill="#4A2800"/>
    <path d="M46 12 C42 6 39 2 37 4" stroke="#4A2800" stroke-width="2" fill="none" stroke-linecap="round"/>
