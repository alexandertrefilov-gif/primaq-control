    <circle cx="50" cy="28" r="0.9" fill="#6A4020" opacity="0.75"/>
    <circle cx="50" cy="38" r="0.9" fill="#6A4020" opacity="0.75"/>
    <circle cx="50" cy="48" r="0.9" fill="#6A4020" opacity="0.75"/>
    <circle cx="50" cy="58" r="0.9" fill="#6A4020" opacity="0.75"/>
    <circle cx="50" cy="68" r="0.9" fill="#6A4020" opacity="0.75"/>
    <path d="M47 82 C47 88 53 88 53 82" fill="#3A1A00"/>
    <path d="M48 10 C44 4 41 0 39 2" stroke="#3A1A00" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M52 10 C56 4 59 0 61 2" stroke="#3A1A00" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

