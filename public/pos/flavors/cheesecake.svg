<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Warm cream background -->
  <circle cx="50" cy="54" r="44" fill="#FFF8EC"/>

  <!-- Plate shadow -->
  <ellipse cx="50" cy="94" rx="36" ry="5" fill="#E8C870" opacity="0.28"/>

  <!-- Graham crust layer -->
  <rect x="10" y="76" width="80" height="14" rx="4" fill="#CC8F3E"/>
  <line x1="12" y1="83"  x2="88" y2="83"  stroke="#A06828" stroke-width="1.2" opacity="0.5"/>
  <line x1="30" y1="76"  x2="30" y2="90"  stroke="#A06828" stroke-width="1"   opacity="0.4"/>
  <line x1="50" y1="76"  x2="50" y2="90"  stroke="#A06828" stroke-width="1"   opacity="0.4"/>
  <line x1="70" y1="76"  x2="70" y2="90"  stroke="#A06828" stroke-width="1"   opacity="0.4"/>
  <!-- Crust right-side shadow -->
  <rect x="82" y="76" width="8" height="14" rx="2" fill="#A06828" opacity="0.25"/>

  <!-- Cheesecake filling body -->
  <rect x="10" y="34" width="80" height="43" fill="#FFF0C0"/>
  <!-- Right-side depth shadow on filling -->
  <rect x="82" y="34" width="8"  height="43" fill="#E8D080" opacity="0.55"/>
  <!-- Highlight on left of filling -->
  <rect x="10" y="34" width="6"  height="43" fill="white"  opacity="0.25"/>

  <!-- Sour-cream top layer -->
  <rect x="10" y="26" width="80" height="12" rx="5" fill="#FFFAE8"/>
  <path d="M10 29 Q30 24 50 29 Q70 34 90 29" stroke="#F5DCA0" stroke-width="2.5" fill="none"/>

  <!-- Strawberry garnish -->
  <path d="M43 8 C37 8 31 15 33 23 C35 31 43 35 50 35 C57 35 65 31 67 23 C69 15 63 8 57 8 L50 3 Z"
        fill="#E82040"/>
  <!-- Strawberry highlight -->
  <path d="M38 14 C38 11 43 9 46 12" stroke="white" stroke-width="1.5" fill="none" opacity="0.45"
        stroke-linecap="round"/>
  <!-- Seeds -->
  <ellipse cx="44" cy="15" rx="1.2" ry="0.9" fill="#FFC8A0" transform="rotate(-15 44 15)"/>
  <ellipse cx="50" cy="11" rx="1.2" ry="0.9" fill="#FFC8A0"/>
  <ellipse cx="56" cy="15" rx="1.2" ry="0.9" fill="#FFC8A0" transform="rotate(15 56 15)"/>
  <ellipse cx="44" cy="23" rx="1.2" ry="0.9" fill="#FFC8A0" transform="rotate(-8 44 23)"/>
  <ellipse cx="50" cy="27" rx="1.2" ry="0.9" fill="#FFC8A0"/>
  <ellipse cx="56" cy="23" rx="1.2" ry="0.9" fill="#FFC8A0" transform="rotate(8 56 23)"/>
  <!-- Leaves -->
  <path d="M44 8 C42 3 38 1 40 -1 C43 -2 44 3 44 8"  fill="#228020"/>
  <path d="M50 3 C50 -3 48 -6 50 -7 C52 -6 50 -3 50 3" fill="#30A030"/>
  <path d="M56 8 C58 3 62 1 60 -1 C57 -2 56 3 56 8"  fill="#228020"/>
</svg>
